---
# Areas
dashboard:
  - changed-files:
      - any-glob-to-any-file:
          - "apps/dashboard/**/*"

web:
  - changed-files:
      - any-glob-to-any-file:
          - "apps/web/**/*"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**/*"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"

test:
  - changed-files:
      - any-glob-to-any-file:
          - "apps/**/*.spec.ts"
          - "apps/**/*.test.ts"
          - "packages/**/*.spec.ts"
          - "packages/**/*.test.ts"
